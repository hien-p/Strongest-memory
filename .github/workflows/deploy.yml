name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The repo declares a pnpm workspace (Foundry + TS packages live under
      # packages/), so wrangler-action auto-detects pnpm via package.json's
      # packageManager field. Corepack makes pnpm available on the runner.
      - name: Enable Corepack (provides pnpm)
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Build the React landing (apps/landing/) into apps/landing/dist/, then
      # copy the built files into apps/web/ overwriting the static index.html.
      # Existing static sub-pages (/verify, /metrics, /leaderboard, /logs) survive.
      - name: Build React landing
        run: pnpm --filter @strongest/landing build

      - name: Stage built landing into apps/web/
        run: |
          cp -R apps/landing/dist/. apps/web/
          ls -la apps/web/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web --project-name=strongest --branch=main --commit-dirty=true
          # Cloudflare Pages serves at https://strongest.pages.dev (clean URL —
          # no account-subdomain segment unlike *.workers.dev). Project was
          # created with `wrangler pages project create strongest --production-branch=main`.
