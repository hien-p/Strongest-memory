# Foundry workspace for strongest contracts
# Reference impl: 0glabs/0g-agent-nft @ eip-7857-draft (copied to src/)
# Our addition: src/RoyaltyHook.sol

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

# Mirror the upstream layout under @openzeppelin so AgentNFT's imports resolve.
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
aristotle = "https://evmrpc.0g.ai"
galileo = "https://evmrpc-testnet.0g.ai"

[etherscan]
aristotle = { key = "${BLOCKSCOUT_API_KEY}", url = "https://chainscan.0g.ai/api" }
galileo  = { key = "${BLOCKSCOUT_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
